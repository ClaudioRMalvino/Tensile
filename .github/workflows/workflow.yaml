name: Tensile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler:
          - { cxx: g++-13, c: gcc-13}
          - { cxx: clang++, c: clang }
        sanitizer: [none, asan, ubsan]
        exclude: 
          - os: macos-latest
            compiler: {cxx: g++-13, c: gcc-13}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubunutu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build g++-13

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ninja


    - name: Configure CMake
      env:
        CXX: ${{ matrix.compiler.cxx }}
        CC: ${{ matrix.compiler.c }}
      run: |
        if [ "${{ matrix.sanitizer }}" == "asan" ]; then
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
        elif [ "${{ matrix.sanitizer }}" == "ubsan" ]; then
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=undefined" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined"
        else
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        fi

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure

    - name: Run Benchmarks
      if: matrix.sanitizer == 'none'
      run: ./build/benchmarks/tensile_benchmarks
