name: Tensile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cxx: g++, c: gcc }
          - { cxx: clang++, c: clang }
        sanitizer: [none, asan, ubsan]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Configure CMake
      env:
        CXX: ${{ matrix.compiler.cxx }}
        CC: ${{ matrix.compiler.c }}
      run: |
        if [ "${{ matrix.sanitizer }}" == "asan" ]; then
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
        elif [ "${{ matrix.sanitizer }}" == "ubsan" ]; then
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=undefined" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined"
        else
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
        fi

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure

    - name: Run Benchmarks
      run: ./build/benchmarks/initBenchmark
